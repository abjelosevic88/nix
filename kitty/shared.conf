# Cross-platform kitty config. Included by mac/kitty.conf and linux/kitty.conf.

# Image protocol support
protocol kitten graphics

# CSI-u escape disambiguation so nvim can distinguish ctrl+i from Tab
# and ctrl+o from <C-o>.
map ctrl+i send_text all \x1b[105;5u
map ctrl+o send_text all \x1b[111;5u

# Font
font_size 20.0
modify_font cell_height +10px

# Background image (absolute path so this works regardless of which
# entrypoint includes shared.conf).
background_image ~/nix/kitty/bg-blurred.png
background_image_layout scaled
background_image_opacity 0.1

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
