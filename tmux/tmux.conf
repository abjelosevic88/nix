# --- General Settings ---
unbind C-b
bind C-a send-prefix
set -g status-position top
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# Support images
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# bind windows navigation
# Cmd+Shift+H/L mapped via terminal emulator sending custom escape sequences
bind-key -n M-H previous-window
bind-key -n M-L next-window

# --- Status Bar Layout ---
# Catppuccin variables (@catppuccin_flavor, window styling) are set via
# per-plugin extraConfig in home/common.nix so they take effect before
# the catppuccin plugin's run-shell, not after.
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""

# Right side: Session Name | Date/Time | Continuum Status
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
# Custom pill for your Continuum Save Status
set -ag status-right "#[fg=#{@thm_green},bg=#{@thm_surface_0}] 󱑖 #{continuum_status}m "

# Continuum/resurrect variables (@continuum-restore, @continuum-save-interval)
# are set via per-plugin extraConfig in home/common.nix for the same reason.
